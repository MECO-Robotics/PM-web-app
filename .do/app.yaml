name: meco-web
region: nyc
static_sites:
  - name: web
    github:
      repo: MECO-Robotics/meco-web
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      - key: VITE_API_BASE_URL
        value: https://meco-platform-xxxxx.ondigitalocean.app
